<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PED-MIDAS 설문 프로그램</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="../js/survey-nav.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f8f9fa; color: #333; }
        .container { display: flex; gap: 25px; max-width: 1300px; margin: auto; }
        .survey-section { flex: 2.5; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .control-section { flex: 1; background: #f1f3f5; padding: 25px; border-radius: 12px; position: sticky; top: 20px; height: fit-content; border: 1px solid #dee2e6; }
        
        h2 { border-bottom: 3px solid #007bff; padding-bottom: 12px; margin-top: 0; color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #dee2e6; padding: 15px; text-align: center; }
        th { background-color: #e9ecef; font-weight: bold; }
        .question-text { text-align: left; width: 70%; font-size: 1.05em; line-height: 1.4; }
        
        /* 숫자 입력 필드 스타일 */
        .input-number { 
            width: 80px; 
            padding: 8px; 
            font-size: 1.1em; 
            text-align: center; 
            border: 2px solid #ced4da; 
            border-radius: 4px;
        }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 1.1em; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ced4da; border-radius: 6px; font-size: 1.1em; }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.2s; }
        
        .btn-calc { background-color: #28a745; color: white; width: 100%; font-size: 1.2em; margin-bottom: 10px; }
        .btn-nav { background-color: #007bff; color: white; flex: 1; }
        .btn-save { background-color: #17a2b8; color: white; width: 100%; margin-top: 10px; }
        .btn-reset { background-color: #6c757d; color: white; flex: 1; }
        .btn-exit { background-color: #dc3545; color: white; flex: 1; }
        button:hover { opacity: 0.85; transform: translateY(-1px); }

        .score-display { background: #ffffff; border: 3px solid #007bff; border-radius: 10px; padding: 25px; margin: 20px 0; text-align: center; }
        .score-label { font-size: 1.1em; color: #495057; margin-bottom: 5px; }
        #current-patient-id { font-size: 1.3em; font-weight: bold; color: #212529; display: block; margin-bottom: 10px; }
        #current-score { font-size: 3.5em; font-weight: 800; color: #007bff; margin: 5px 0; }
        .score-unit { font-size: 1.1em; color: #868e96; }
    </style>
</head>
<body>

<div class="container">
    <div class="survey-section">
        <h2>PED-MIDAS 설문</h2>
        <p style="color: #666;">※ 지난 3개월 동안의 두통 영향에 대해 해당되는 숫자를 기입해 주세요.</p>
        
        <table>
            <thead>
                <tr>
                    <th>No.</th>
                    <th>질문 내용</th>
                    <th>답변 (일수/횟수)</th>
                </tr>
            </thead>
            <tbody id="question-table"></tbody>
        </table>
    </div>

    <div class="control-section" id="control-section">
        <div class="score-display">
            <div class="score-label">환자 번호</div>
            <span id="current-patient-id">-</span>
            <div class="score-label">계산된 총점</div>
            <div id="current-score">0</div>
            <div class="score-unit">점</div>
        </div>

        <div class="btn-group">
            <button class="btn-reset" onclick="resetCurrentForm()">초기화</button>
            <button class="btn-exit" onclick="snGoHome()">홈으로</button>
        </div>

        <button class="btn-calc" onclick="processEntry()" style="margin-top:10px;">점수 계산</button>
    </div>
</div>

<script>
    const questions = [
        { id: 1, text: "지난 3개월 동안 또는 지난 외래부터 금일까지 두통 때문에 결석을 몇 일이나 했습니까?" },
        { id: 2, text: "지난 3개월 동안 또는 지난 외래부터 금일까지 두통 때문에 지각이나 조퇴를 몇 번이나 했습니까? (단, 결석은 포함하지 않음)" },
        { id: 3, text: "지난 3개월 동안 또는 지난 외래부터 금일까지 두통 때문에 학교에서 활동을 절반 이하로 한적이 몇 일이나 있습니까? (단, 결석, 지각, 조퇴는 포함하지 않음)" },
        { id: 4, text: "지난 3개월 동안 또는 지난 외래부터 금일까지 두통 때문에 집안일이나 숙제 등을 못한 적이 몇 일이나 있습니까?" },
        { id: 5, text: "지난 3개월 동안 또는 지난 외래부터 금일까지 두통 때문에 다른 활동에 참여하지 못한 적이 몇 일이나 있습니까? (예를 들어 놀이, 외출, 스포츠 등등)" },
        { id: 6, text: "지난 3개월 동안 또는 지난 외래부터 금일까지 두통 때문에 다른 활동에 부분적으로 참여하지 못한 적이 몇 일이나 있습니까? (단, 5번 질문에서 셈한 날은 제외)" }
    ];

    let db = [];
    let curIdx = -1;

    window.addEventListener('load', function () {
        snInjectNavBar('PED_MIDAS.html');
        snInjectSurveyNavButtons('PED_MIDAS.html', 'control-section');

        const results = snGetResults();
        if (results.PEDMIDAS) {
            const saved = results.PEDMIDAS;
            document.getElementById('current-patient-id').innerText = saved.patientId || '-';
            document.getElementById('current-score').innerText = saved.score ?? 0;
            Object.entries(saved.answers || {}).forEach(([qId, val]) => {
                const input = document.getElementById(`q${qId}`);
                if (input) input.value = val;
            });
        }
    });

    const tbody = document.getElementById('question-table');
    questions.forEach(q => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${q.id}</td>
            <td class="question-text">${q.text}</td>
            <td><input type="number" id="q${q.id}" class="input-number" min="0" placeholder="0"></td>
        `;
        tbody.appendChild(row);
    });

    function processEntry() {
        const sess = snGetSession();
        const id   = sess ? sess.patientId : '';
        if (!id) { alert("세션 정보가 없습니다. 메인 페이지에서 다시 시작해주세요."); return; }

        let score = 0;
        let logs = {};
        let missing = false;

        questions.forEach(q => {
            const valInput = document.getElementById(`q${q.id}`).value;
            if (valInput === "") { missing = true; return; }
            
            let val = parseInt(valInput);
            score += val;
            logs[q.id] = val;
        });

        if (missing) { alert("모든 문항에 숫자를 기입해주세요. (없으면 0 입력)"); return; }

        const found = db.findIndex(p => p.id === id);
        if (found > -1) {
            db[found] = { id, score, logs };
            curIdx = found;
        } else {
            db.push({ id, score, logs });
            curIdx = db.length - 1;
        }

        document.getElementById('current-patient-id').innerText = id;
        document.getElementById('current-score').innerText = score;

        snSaveResult('PED_MIDAS.html', {
            patientId: id,
            birthdate: sess ? sess.birthdate : '',
            age:       sess ? sess.age       : '',
            date:      new Date().toISOString().split('T')[0],
            score:     score,
            answers:   logs
        });

        alert(`환자 ${id}의 데이터가 저장되었습니다. 총점: ${score}점`);
    }

    // changePatient() 제거 — 설문 간 이동은 snGoToPrev/snGoToNext 로 대체

    function clearUI() {
        document.getElementById('current-patient-id').innerText = "-";
        document.getElementById('current-score').innerText = "0";
        document.querySelectorAll('.input-number').forEach(i => i.value = "");
    }

    function resetCurrentForm() {
        if (confirm("입력 중인 내용을 초기화하시겠습니까?")) {
            clearUI();
        }
    }

    // downloadExcel() 제거 — 통합 결과 출력(snExportAllResults)으로 대체

</script>

</body>
</html>
